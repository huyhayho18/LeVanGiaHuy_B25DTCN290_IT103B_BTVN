<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="product-form">
        <input type="text" id="product-name" placeholder="Tên sản phẩm">
        <input type="number" id="product-price" placeholder="Giá(VND)">
        <button type="submit" id="addBtn">Thêm Sản Phẩm</button>
    </form>
    <ul id="product-list"></ul>
    <script>
        const productForm = document.getElementById("product-form");
        const nameProduct = document.getElementById("product-name");
        const priceProduct = document.getElementById("product-price");
        const addBtn = document.getElementById("addBtn");
        const productList = document.getElementById("product-list");

        addBtn.addEventListener(`click`,taskList)

        function taskList(e) {
        e.preventDefault();
            let nameInput = nameProduct.value;
            let priceInput = priceProduct.value;
            let newTast = {
                name: nameInput,
                price: priceInput
            }
            const li = document.createElement("li");
            li.classList.add("product-item");
            li.innerHTML = `
                <span class="product-name">${newTast.name}</span>
                <span class="product-price">${newTast.price} VND</span>
                <button type="button" class="deleteBtn">Xóa sản phẩm</button>
            `;
            const deleteBtn = li.querySelector(".deleteBtn");
            deleteBtn.addEventListener("click", function(){
            li.remove();
            });
            productList.appendChild(li);
            nameProduct.value = "";
            priceProduct.value = "";
        }
        
    </script>
</body>
</html>
