<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tết Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1a0a00;
  font-family: 'Be Vietnam Pro', sans-serif;
}

.app {
  width: 380px;
  background: linear-gradient(160deg, #c0392b, #e74c3c 50%, #c0392b);
  border-radius: 20px;
  padding: 28px 24px 24px;
  position: relative;
  overflow: hidden;
}

.app::before, .app::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  background: rgba(255,220,0,0.09);
  pointer-events: none;
}
.app::before { width: 180px; height: 180px; top: -40px; right: -40px; }
.app::after  { width: 220px; height: 220px; bottom: -60px; left: -60px; }

/* Header */
.hd { text-align: center; margin-bottom: 20px; }
.hd h1 { font-size: 24px; font-weight: 700; color: #FFD700; margin-bottom: 4px; }
.hd p  { font-size: 13px; color: rgba(255,255,255,0.75); }

/* Add form */
.add-form {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.add-form input {
  flex: 1;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1.5px solid rgba(255,215,0,0.4);
  background: rgba(255,245,210,0.95);
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 14px;
  color: #5a2800;
  outline: none;
}
.add-form input::placeholder { color: #b8905a; }
.add-form input:focus { border-color: #FFD700; }
.add-form button {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  background: #FFD700;
  color: #5a2800;
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
}
.add-form button:hover  { background: #ffe033; }
.add-form button:active { transform: scale(0.97); }

/* Task list */
.list { display: flex; flex-direction: column; gap: 10px; }

.item {
  display: flex;
  align-items: center;
  background: rgba(255,245,210,0.97);
  border-radius: 14px;
  padding: 13px 16px;
  border: 1.5px solid rgba(255,215,0,0.3);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow 0.15s;
}
.item:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.15); }

.item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: #FFD700;
  border-radius: 14px 0 0 14px;
}

.icon  { font-size: 20px; margin-right: 12px; flex-shrink: 0; }
.name { flex: 1; font-size: 15px; font-weight: 500; color: #5a2800; word-break: break-word; }
.tag  {
  font-size: 12px; font-weight: 500;
  color: #b86800; padding: 3px 10px;
  border-radius: 20px;
  background: rgba(255,180,0,0.15);
  border: 1px solid rgba(255,180,0,0.3);
  flex-shrink: 0;
}

/* Done state */
.item.done .name { text-decoration: line-through; color: #a07850; }
.item.done .tag  { color: #4a8a3a; background: rgba(80,180,60,0.15); border-color: rgba(80,180,60,0.3); }
.item.done::before { background: #5a8a3a; }

/* Action buttons */
.actions {
  display: flex;
  gap: 6px;
  margin-left: 10px;
  flex-shrink: 0;
}

.edit-btn, .delete-btn {
  padding: 4px 8px;
  border: none;
  font-size: 13px;
  border-radius: 6px;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.edit-btn:hover, .delete-btn:hover { opacity: 0.85; }
.edit-btn:active, .delete-btn:active { transform: scale(0.93); }

.edit-btn   { background: #f39c12; color: white; }
.delete-btn { background: #e74c3c; color: white; }

/* Inline edit mode */
.item.editing { cursor: default; }
.item.editing .name-display { display: none; }
.edit-input-wrap { display: none; flex: 1; }
.item.editing .edit-input-wrap { display: flex; gap: 6px; align-items: center; }

.edit-input {
  flex: 1;
  padding: 5px 10px;
  border-radius: 8px;
  border: 1.5px solid #f39c12;
  background: #fff8e8;
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 14px;
  color: #5a2800;
  outline: none;
}
.edit-input:focus { border-color: #e67e22; }

.save-btn, .cancel-btn {
  padding: 4px 8px;
  border: none;
  font-size: 12px;
  font-weight: 700;
  border-radius: 6px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.save-btn   { background: #27ae60; color: white; }
.cancel-btn { background: #7f8c8d; color: white; }
.save-btn:hover   { opacity: 0.85; }
.cancel-btn:hover { opacity: 0.85; }

/* Note */
.note { text-align: center; margin-top: 14px; font-size: 11px; color: rgba(255,255,255,0.45); }
</style>
</head>
<body>

<div class="app">
  <div class="hd">
    <h1>Chuẩn bị Tết Nguyên Đán</h1>
    <div class="add-form">
      <input type="text" id="newTask" placeholder="Nhập công việc mới..." />
      <button id="addBtn">Thêm</button>
    </div>
    <p>Danh sách việc cần làm</p>
  </div>

  <div class="list" id="list"></div>
  <div class="note">Danh sách việc cần làm cho Tết</div>
</div>

<script>
const KEY = "myTodos";
const initialTodos = [
  { id: 1, task: "Mua bánh chưng",     done: false },
  { id: 2, task: "Dọn nhà đón Tết",   done: false },
  { id: 3, task: "Gói bánh chưng",    done: false },
  { id: 4, task: "Trang trí nhà cửa", done: false },
];

// --- Single source of truth ---
let todos = [];

function persist() {
  localStorage.setItem(KEY, JSON.stringify(todos));
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  todos.forEach(todo => {
    const item = document.createElement("div");
    item.classList.add("item");
    if (todo.done) item.classList.add("done");

    item.innerHTML = `
      <span class="icon">🌸</span>
      <span class="name name-display">${escHtml(todo.task)}</span>
      <div class="edit-input-wrap">
        <input class="edit-input" type="text" value="${escHtml(todo.task)}" />
        <button class="save-btn">✔</button>
        <button class="cancel-btn">✖</button>
      </div>
      <span class="tag">${todo.done ? "Hoàn thành" : "Chưa làm"}</span>
      <div class="actions">
        <button class="edit-btn" title="Chỉnh sửa">✏️</button>
        <button class="delete-btn" title="Xóa">🗑️</button>
      </div>
    `;

    // Toggle done
    item.addEventListener("click", e => {
      if (item.classList.contains("editing")) return;
      if (e.target.closest(".actions")) return;
      todo.done = !todo.done;
      persist();
      render();
    });

    // Edit — enter inline edit mode
    item.querySelector(".edit-btn").addEventListener("click", e => {
      e.stopPropagation();
      item.classList.add("editing");
      const inp = item.querySelector(".edit-input");
      inp.style.borderColor = "#f39c12";
      inp.focus();
      inp.select();
    });

    // Save edit
    item.querySelector(".save-btn").addEventListener("click", e => {
      e.stopPropagation();
      const inp = item.querySelector(".edit-input");
      const newName = inp.value.trim();
      if (!newName) {
        inp.focus();
        inp.style.borderColor = "#e74c3c";
        return;
      }
      todo.task = newName;
      persist();
      render();
    });

    // Cancel edit
    item.querySelector(".cancel-btn").addEventListener("click", e => {
      e.stopPropagation();
      item.classList.remove("editing");
      item.querySelector(".edit-input").value = todo.task;
    });

    // Keyboard shortcuts in edit input
    item.querySelector(".edit-input").addEventListener("keydown", e => {
      e.stopPropagation();
      if (e.key === "Enter")  item.querySelector(".save-btn").click();
      if (e.key === "Escape") item.querySelector(".cancel-btn").click();
    });

    // Delete
    item.querySelector(".delete-btn").addEventListener("click", e => {
      e.stopPropagation();
      if (!confirm(`Xóa công việc "${todo.task}"?`)) return;
      todos = todos.filter(t => t.id !== todo.id); // mutate module-level array
      persist();
      render();
    });

    list.appendChild(item);
  });
}

function addTodo() {
  const input = document.getElementById("newTask");
  const task  = input.value.trim();
  if (!task) return;
  todos.push({ id: Date.now(), task, done: false });
  persist();
  render();
  input.value = "";
  input.focus();
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function init() {
  const raw = localStorage.getItem(KEY);
  todos = raw ? JSON.parse(raw) : [...initialTodos];
  if (!raw) persist();
  render();

  document.getElementById("addBtn").addEventListener("click", addTodo);
  document.getElementById("newTask").addEventListener("keydown", e => {
    if (e.key === "Enter") addTodo();
  });
}

init();
</script>

</body>
</html>
