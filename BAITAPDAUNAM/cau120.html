<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr = [1, "", 3, null];
        let hasEmpty = false;
        for (let i = 0; i < arr.length; i++) {
            if (arr[i] === "" || arr[i] === null || arr[i] === undefined) {
                hasEmpty = true;
                break;
            }
        }
        if (hasEmpty) {
        console.log("Mảng có chứa phần tử rỗng");
        } else {
        console.log("Mảng không chứa phần tử rỗng");
        }
    </script>
</body>
</html>
