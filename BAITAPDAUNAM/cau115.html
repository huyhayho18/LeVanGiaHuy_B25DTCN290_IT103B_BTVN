<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = prompt("Nhập một số nguyên dương:");
        let result = 1;
        if (n < 0) {
        console.log("Không tồn tại giai thừa cho số âm");
        } else {
        for (let i = 1; i <= n; i++) {
            result *= i;
        }
        console.log(n + "! =", result);
        }
    </script>
</body>
</html>
